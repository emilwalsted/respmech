name: Build installers

# Builds the native desktop installers with briefcase: a Windows MSI and a macOS dmg,
# uploaded as workflow artifacts and (on a v* tag) attached to a GitHub release.
# Run it by hand (Actions ▸ Build installers ▸ Run workflow) or by pushing a v* tag.
#
# macOS SIGNING IS OPTIONAL AND SECRET-GATED: with the Apple secrets present the dmg is
# Developer ID-signed + notarised; without them it falls back to ad-hoc signing (the
# previous behaviour), so the pipeline never breaks while certificates are being set up.
#
#   macOS secrets: APPLE_DEV_ID_IDENTITY, APPLE_CERTIFICATE_P12_BASE64,
#                  APPLE_CERTIFICATE_PASSWORD, APPLE_ID, APPLE_TEAM_ID,
#                  APPLE_APP_SPECIFIC_PASSWORD, KEYCHAIN_PASSWORD
#
# The Windows MSI is deliberately built UNSIGNED here and Authenticode-signed LOCALLY after
# publishing, with the maintainer's Certum code-signing card (scripts/sign-msi-certum.sh).
# Certum individual/OSS keys are hardware-backed (no exportable PFX, per the 2023 CA/B
# rules) and SimplySign needs an interactive session, so they cannot sign on an ephemeral
# CI runner — and Azure's individual signing path is US/Canada-only, unavailable in DK.
# See docs/SIGNING.md for both platforms.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  windows-msi:
    name: Windows MSI (unsigned — signed locally post-release)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"          # numba/llvmlite (via librosa) ship cp312 wheels
      - name: Install briefcase
        run: |
          python -m pip install --upgrade pip
          pip install "briefcase>=0.3.19"

      # The MSI is built UNSIGNED here on purpose. A Certum individual/OSS certificate is
      # hardware-backed (physical card or SimplySign cloud, no exportable PFX per the 2023
      # CA/B rules) and needs an interactive login, so it cannot sign on an ephemeral CI
      # runner. It is Authenticode-signed locally after release with
      # scripts/sign-msi-certum.sh (see docs/SIGNING.md). --adhoc-sign yields an unsigned MSI.
      - name: Create · build · package (unsigned)
        run: |
          briefcase create windows --no-input
          briefcase build windows --no-input
          briefcase package windows --adhoc-sign --packaging-format msi --no-input

      - name: Show artifacts
        run: ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: RespMech-Windows-MSI
          path: dist/*.msi
          if-no-files-found: error

  macos-dmg:
    name: macOS dmg
    runs-on: macos-latest
    outputs:
      signed: ${{ steps.check.outputs.sign }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install briefcase
        run: |
          python -m pip install --upgrade pip
          pip install "briefcase>=0.3.19"

      # Sign+notarise only when the Developer ID secrets are configured; else ad-hoc sign.
      - name: Detect signing config
        id: check
        env:
          APPLE_DEV_ID_IDENTITY: ${{ secrets.APPLE_DEV_ID_IDENTITY }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -n "$APPLE_DEV_ID_IDENTITY" ] && [ -n "$APPLE_CERTIFICATE_P12_BASE64" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple signing secrets not set — building an AD-HOC-SIGNED dmg (not notarised)."
          fi

      - name: Import Developer ID certificate
        if: steps.check.outputs.sign == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_DEV_ID_IDENTITY: ${{ secrets.APPLE_DEV_ID_IDENTITY }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # put the temp keychain first in the search list so codesign finds the identity
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security default-keychain -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          # Defensive: import Apple's Developer ID / WWDR intermediates so a leaf-only .p12
          # chains even for an older (G1) cert or an image that doesn't preinstall them. The
          # `|| true` keeps this non-fatal (current runners already have G2 + WWDR system-wide).
          for u in DeveloperIDG2CA DeveloperIDCA AppleWWDRCAG3; do
            curl -fsSL "https://www.apple.com/certificateauthority/$u.cer" -o "$RUNNER_TEMP/$u.cer" \
              && security import "$RUNNER_TEMP/$u.cer" -k "$KEYCHAIN" || true
          done
          # Fail FAST (seconds, not ~20 min into `briefcase package`) if the signing identity is
          # absent or its name doesn't byte-match the secret — the #1 first-run secret-typo trap.
          # briefcase does an EXACT name match, so this grep is exactly what will be looked up.
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -F -- "$APPLE_DEV_ID_IDENTITY" \
            || { echo "::error::Signing identity not found. APPLE_DEV_ID_IDENTITY must be the EXACT string from 'security find-identity -v -p codesigning' (e.g. 'Developer ID Application: Name (TEAMID)'); also check APPLE_CERTIFICATE_P12_BASE64 / APPLE_CERTIFICATE_PASSWORD."; exit 1; }

      - name: Create · build
        run: |
          briefcase create macOS --no-input
          briefcase build macOS --no-input

      # Signed builds: sign the .app with the Developer ID (hardened runtime is applied
      # automatically) but let US notarise — briefcase's own notarisation prompts
      # interactively and would hang under --no-input.
      - name: Package
        env:
          APPLE_DEV_ID_IDENTITY: ${{ secrets.APPLE_DEV_ID_IDENTITY }}
        run: |
          if [ "${{ steps.check.outputs.sign }}" = "true" ]; then
            briefcase package macOS --identity "$APPLE_DEV_ID_IDENTITY" \
              --no-notarize --packaging-format dmg --no-input
          else
            briefcase package macOS --adhoc-sign --packaging-format dmg --no-input
          fi

      - name: Notarize and staple dmg
        if: steps.check.outputs.sign == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          DMG=$(ls dist/*.dmg | head -n1)
          OUT=$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)
          echo "$OUT"
          # notarytool submit --wait can exit 0 even on a REJECTED submission; gate on the status
          # and print Apple's rejection reasons so a bad run is diagnosable without a blind re-run.
          SID=$(echo "$OUT" | jq -r .id)
          STATUS=$(echo "$OUT" | jq -r .status)
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization status: $STATUS — full log:"
            xcrun notarytool log "$SID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Show artifacts
        run: ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: RespMech-macOS-dmg
          path: dist/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    needs: [windows-msi, macos-dmg]
    if: startsWith(github.ref, 'refs/tags/v')   # only on a v* tag, not on manual dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: write                           # create the release + upload assets
    steps:
      - name: Download the built installers
        uses: actions/download-artifact@v4
        with:
          path: dist                            # -> dist/<artifact-name>/<file>
      - name: Publish release with installers attached
        env:
          GH_TOKEN: ${{ github.token }}
          MAC_SIGNED: ${{ needs.macos-dmg.outputs.signed }}
        run: |
          ls -R dist
          # The Windows MSI CI attaches is unsigned; it is Certum-signed locally after release
          # (scripts/sign-msi-certum.sh, which replaces this asset). The Run-anyway note holds
          # in BOTH states — a brand-new code-signing cert has no SmartScreen reputation yet.
          # macOS notes track the actual CI signing (Developer ID + notarisation).
          win_file='`RespMech-*.msi`'
          win_install='- **Windows:** if SmartScreen warns (unrecognised app / unknown publisher), *More info ▸ Run anyway*. A new code-signing certificate has no reputation yet, so this can appear even on a signed build.'
          if [ "$MAC_SIGNED" = "true" ]; then
            mac_file='`RespMech-*.dmg` (signed + notarised)'
            mac_install='- **macOS:** open the dmg and drag the app to Applications — it launches with no Gatekeeper warning.'
          else
            mac_file='`RespMech-*.dmg` (ad-hoc signed)'
            mac_install='- **macOS:** right-click ▸ **Open** the first time (or `xattr -dr com.apple.quarantine` the app).'
          fi
          {
            echo "Desktop installers — download below."
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            echo "| Windows | $win_file |"
            echo "| macOS | $mac_file |"
            echo
            echo "**Install**"
            echo "$win_install"
            echo "$mac_install"
            echo
            echo "Bundles its own Python + the full scientific stack; no separate install needed."
          } > notes.md
          gh release create "$GITHUB_REF_NAME" -R "$GITHUB_REPOSITORY" \
            --title "RespMech $GITHUB_REF_NAME" \
            --latest \
            --notes-file notes.md \
            dist/*/*.msi dist/*/*.dmg

      # Tell the website (emilwalsted/respmech-website) to re-publish so its
      # download button / version labels pick up this release immediately. A
      # release created by GITHUB_TOKEN does not trigger workflows elsewhere, so
      # we ping it explicitly. Needs a PAT with contents:write on the website
      # repo; if it is not set, this is skipped and the release is unaffected.
      - name: Notify respmech.dk to publish the new version
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "::notice::WEBSITE_DISPATCH_TOKEN not set — skipping the respmech.dk publish trigger."
            exit 0
          fi
          code=$(curl -sS -o /dev/null -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $WEBSITE_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/emilwalsted/respmech-website/dispatches \
            -d '{"event_type":"respmech-release"}')
          if [ "$code" = "204" ]; then
            echo "Triggered respmech-website publish (repository_dispatch: respmech-release)."
          else
            echo "::warning::respmech.dk publish trigger returned HTTP $code (check the WEBSITE_DISPATCH_TOKEN scope)."
          fi
