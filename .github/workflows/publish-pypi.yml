name: Publish to PyPI

# Publishes the RespMech Python package to PyPI via **Trusted Publishing (OIDC)** — there
# is NO API token stored anywhere in this repo or in GitHub secrets. PyPI mints a short-
# lived credential only for a run whose identity (owner / repo / workflow file / GitHub
# environment) matches a "pending/trusted publisher" you configure once on PyPI.
#
# It fires on the SAME `v*` tag as the installer release (.github/workflows/release.yml),
# so a single `git tag vX.Y.Z && git push origin vX.Y.Z` cuts BOTH the signed dmg/MSI
# GitHub release AND the PyPI package. The two workflows write to different targets and
# never conflict.
#
# A manual run (Actions ▸ Publish to PyPI ▸ Run workflow) publishes to **TestPyPI** instead
# — a safe dry-run that never touches real PyPI.
#
# ── One-time maintainer setup on PyPI (no secrets involved) ───────────────────────────
#   PyPI ▸ your account ▸ Publishing ▸ "Add a pending publisher":
#       PyPI Project Name:  respmech
#       Owner:              emilwalsted
#       Repository name:    respmech
#       Workflow name:      publish-pypi.yml
#       Environment name:   pypi
#   (For the dry-run path, repeat on test.pypi.org with Environment name: testpypi.)
#   See RELEASING.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}          # manual → TestPyPI dry-run

# Least privilege: no permissions by default; each job opts into exactly what it needs.
permissions: {}

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false      # never cancel an in-flight publish

jobs:
  # ── 1. Test gate ──────────────────────────────────────────────────────────────────────
  # Runs on macOS because that is a platform the CI already proves the full (GUI-inclusive)
  # unit suite green on; the project deliberately does not run the Qt GUI tests on Linux.
  # Tag pushes do NOT trigger ci.yml (it is branch/PR-scoped), so this is the release-time
  # gate. If you ever want to trim runner cost, narrow this to the numerical golden only.
  test:
    name: Test gate (unit + numerical golden)
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (gui + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui,dev]"
      - name: Run tests
        run: python -m pytest tests/unit tests/golden/test_golden.py -q

  # ── 2. Build + verify the distributions ──────────────────────────────────────────────
  build:
    name: Build sdist + wheel
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Built version must match the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          WHL=$(ls dist/respmech-*.whl)
          VER=$(basename "$WHL" | sed -E 's/^respmech-([^-]+)-.*/\1/')
          TAG="${GITHUB_REF_NAME#v}"
          echo "built=$VER  tag=$TAG"
          if [ "$VER" != "$TAG" ]; then
            echo "::error::built version $VER != tag $TAG — bump src/respmech/__init__.py __version__ (and [tool.briefcase] version) to match the tag."
            exit 1
          fi
      - name: twine check
        run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ── 3a. Publish to PyPI (real releases: on a v* tag only) ────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write            # OIDC — the ONLY credential; no password/token anywhere
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        # Pinned to the v1.14.0 release tag (NOT a commit SHA): this is a Docker-based
        # action whose image is ghcr.io/pypa/gh-action-pypi-publish:<action_ref>, and pypa
        # only publishes tag-named images — a SHA ref yields "manifest unknown".
        uses: pypa/gh-action-pypi-publish@v1.14.0

  # ── 3b. Publish to TestPyPI (manual dry-run: workflow_dispatch only) ──────────────────
  publish-testpypi:
    name: Publish to TestPyPI (dry-run)
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI (Trusted Publishing)
        # Pinned to the v1.14.0 release tag (NOT a commit SHA): this is a Docker-based
        # action whose image is ghcr.io/pypa/gh-action-pypi-publish:<action_ref>, and pypa
        # only publishes tag-named images — a SHA ref yields "manifest unknown".
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
